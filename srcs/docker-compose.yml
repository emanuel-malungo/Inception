services:
  mariadb:
    build: ./requirements/mariadb/
    image: mariadb:inception
    container_name: mariadb
    restart: 
      unless-stopped
    networks:
      - inception_network
    env_file:
      - ./.env
    volumes:
      - mariadb_data:/var/lib/mysql
      - secrets:/run/secrets

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/emalungo/data/mariadb

  secrets:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../secrets

  
networks:
  inception_network:
    driver: bridge