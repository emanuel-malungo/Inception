services:
  mariadb:
    build: ./requirements/mariadb/
    image: mariadb:inception
    container_name: mariadb
    restart: 
      unless-stopped
    networks:
      - inception_network
    env_file:
      - ./.env
    volumes:
      - mariadb_data:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password

  wordpress:
    build: ./requirements/wordpress/
    image: wordpress:inception
    container_name: wordpress
    restart: 
      unless-stopped
    networks:
      - inception_network
    env_file:
      - ./.env
    depends_on:
      - mariadb
    secrets:
      - db_password
      - wp_admin_password
      - wp_editor_password
    volumes:
      - wordpress_data:/var/www/html

  nginx:
    build: ./requirements/nginx/
    image: nginx:inception
    container_name: nginx
    restart: 
      unless-stopped
    networks:
      - inception_network
    depends_on:
      - wordpress
    ports:
      - "80:80"
      - "443:443"
        
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/emalungo/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/emalungo/data/wordpress
  
networks:
  inception_network:
    driver: bridge

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_editor_password:
    file: ../secrets/wp_editor_password.txt